<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EV Calculator - eAccountability</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="ev-calculator">
<header class="topbar">
    <div class="logo">
        <img src="logo.png" alt="eAccountability logo">
        <span>eAccountability</span>
    </div>
    <nav class="topnav">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="project-development.html">Project Development</a>
        <a href="budget-adjustment-form.html">Forms</a>
        <a href="login.html" id="loginLink">Login</a>
        <a href="#" id="logout">Logout</a>
    </nav>
</header>

<div class="app-shell">
    <aside class="sidebar">
        <h3>Project Dev</h3>
        <a href="project-development.html" data-page="project-development">Dashboard</a>
        <a href="ev-calculator.html" data-page="ev-calculator">EV Calculator</a>
        <a href="variance-calculator.html" data-page="variance-calculator">CV / SV Calculator</a>
        <a href="performance-calculator.html" data-page="performance-calculator">CPI / SPI / EAC / VAC</a>
    </aside>

    <main class="content">
        <section class="card page-header">
            <h2>EV Calculator</h2>
            <p>Compute Earned Value in pesos using Budget and EV%.</p>
        </section>

        <section class="card">
            <form class="form-grid" id="evForm">
                <label>Budget (PHP)<input type="number" id="budget" value="500000" min="0" step="0.01"></label>
                <label>EV (%)<input type="number" id="evPct" value="40" min="0" max="100" step="0.01"></label>
                <div class="full-width form-actions"><button type="submit">Compute EV</button></div>
            </form>
        </section>

        <section class="card">
            <h3>Result</h3>
            <p id="evResult">EV: PHP 200,000.00</p>
        </section>
    </main>
</div>

<script src="app.js"></script>
<script>
    const peso = (v) => `PHP ${Number(v || 0).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    function compute(ev) {
        ev.preventDefault();
        const budget = Number(document.getElementById('budget').value || 0);
        const evPct = Number(document.getElementById('evPct').value || 0) / 100;
        const evPeso = budget * evPct;
        document.getElementById('evResult').textContent = `EV: ${peso(evPeso)}`;
    }
    document.getElementById('evForm').addEventListener('submit', compute);
</script>
</body>
</html>
