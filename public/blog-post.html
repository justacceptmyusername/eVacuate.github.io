<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog Post - eAccountability</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
    <div class="logo">
        <img src="logo.png" alt="eAccountability logo">
        <span>eAccountability</span>
    </div>
    <nav class="topnav">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="project-development.html">Project Development</a>
        <a href="budget-adjustment-form.html">Forms</a>
        <a href="login.html" id="loginLink">Login</a>
        <a href="#" id="logout">Logout</a>
    </nav>
</header>

<div class="app-shell" style="grid-template-columns: 1fr;">
    <main class="content" style="max-width: 920px; margin: 0 auto; width: 100%;">
        <section class="card page-header">
            <span id="postCategory" class="pill">News</span>
            <h2 id="postTitle">Loading...</h2>
            <p id="postMeta">Loading post details...</p>
        </section>

        <section class="card">
            <div class="news-image-wrap" style="height: 320px; margin-bottom: 16px;">
                <img id="postImage" class="news-image" alt="Post image">
                <div id="postImageFallback" class="news-image-fallback" style="display:none; height:100%;">No image</div>
            </div>
            <p id="postSummary" style="font-weight:700; margin-bottom:14px;"></p>
            <p id="postContent" style="line-height:1.6;"></p>
            <p id="postSourceWrap" style="margin-top:18px;"></p>
            <p style="margin-top:22px;"><a class="button" href="index.html">Back to Home</a></p>
        </section>
    </main>
</div>

<script src="app.js"></script>
<script>
    function escapeHtml(value) {
        const div = document.createElement('div');
        div.textContent = value || '';
        return div.innerHTML;
    }

    async function loadPost() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) {
            document.getElementById('postTitle').textContent = 'Post not found';
            document.getElementById('postMeta').textContent = 'No post id provided.';
            return;
        }

        const res = await fetch(apiUrl(`/api/news/${id}`), { cache: 'no-store' });
        if (!res.ok) {
            document.getElementById('postTitle').textContent = 'Post not found';
            document.getElementById('postMeta').textContent = 'The selected post does not exist.';
            return;
        }

        const post = await res.json();
        document.title = `${post.title} - eAccountability`;
        document.getElementById('postCategory').textContent = post.category || 'News';
        document.getElementById('postTitle').textContent = post.title || '';
        document.getElementById('postMeta').textContent = `By ${post.author || 'Anonymous'} on ${post.published_on || ''}`;
        document.getElementById('postSummary').textContent = post.summary || '';
        document.getElementById('postContent').textContent = post.content || '';

        const image = document.getElementById('postImage');
        image.onerror = () => {
            image.style.display = 'none';
            document.getElementById('postImageFallback').style.display = 'flex';
        };
        if (post.image_url) {
            image.style.display = 'block';
            document.getElementById('postImageFallback').style.display = 'none';
            image.src = post.image_url;
        } else {
            image.style.display = 'none';
            document.getElementById('postImageFallback').style.display = 'flex';
        }

        if (post.source_url) {
            document.getElementById('postSourceWrap').innerHTML = `<a class="muted-link" href="${escapeHtml(post.source_url)}" target="_blank" rel="noopener">Read source</a>`;
        }
    }

    loadPost();
</script>
</body>
</html>
