<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - eAccountability</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
    <div class="logo">
        <img src="logo.png" alt="eAccountability logo">
        <span>eAccountability</span>
    </div>
    <nav class="topnav">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="project-development.html">Project Development</a>
        <a href="budget-adjustment-form.html">Forms</a>
        <a href="login.html" id="loginLink">Login</a>
        <a href="#" id="logout">Logout</a>
    </nav>
</header>

<div class="auth-shell">
    <h2>Welcome back</h2>
    <form id="loginForm">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a class="muted-link" href="register.html">Register here</a></p>
</div>

<script>
    const form = document.getElementById('loginForm');
    form.onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(form);
        const res = await fetch(apiUrl('/api/auth/login'), {
            method: 'POST',
            body: new URLSearchParams(formData)
        });
        if (res.ok) {
            window.location.href = 'dashboard.html';
        } else {
            alert('Login failed!');
        }
    };
</script>
<script src="app.js"></script>
</body>
</html>
